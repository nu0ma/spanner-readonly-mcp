name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      # Node 24 bundles npm < 11.15.0. Pin for allow-file/remote/directory (11.15+)
      # and allow-git (11.10+); npm v12 will default allow-git to none.
      - name: Ensure npm supports install-source allowlists
        run: npm install -g npm@11.15.0

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - name: Verify registry-only install policy
        run: |
          for key in allow-git allow-file allow-remote allow-directory; do
            val=$(npm config get "$key")
            if [ "$val" != "none" ]; then
              echo "::error::$key must be none (got: $val)"
              exit 1
            fi
          done
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            const exotic = /^(git\\+|github:|gitlab:|bitbucket:|file:|https?:|git:|\\/|\\.\\.\\/)/;
            for (const [name, spec] of Object.entries(deps)) {
              if (typeof spec === 'string' && exotic.test(spec)) {
                console.error('Non-registry dependency ' + name + ': ' + spec);
                process.exit(1);
              }
            }
          "

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
