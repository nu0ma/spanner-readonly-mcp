name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test 2>&1 | tee omni-debug-vitest.log
        shell: bash

      - name: Collect Spanner Omni debug info
        if: failure()
        run: |
          mkdir -p omni-debug
          docker compose logs spanner-omni > omni-debug/docker-compose-logs.txt 2>&1 || true
          docker compose ps > omni-debug/docker-compose-ps.txt 2>&1 || true
          docker volume ls > omni-debug/docker-volume-ls.txt 2>&1 || true
          docker images | grep -i spanner > omni-debug/docker-images-spanner.txt 2>&1 || true
          if [ -f omni-debug-vitest.log ]; then
            mv omni-debug-vitest.log omni-debug/vitest-output.log
          fi

      - name: Upload Omni debug artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spanner-omni-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: omni-debug/
          retention-days: 7
          if-no-files-found: warn
