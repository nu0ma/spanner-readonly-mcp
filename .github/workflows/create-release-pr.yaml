name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version bump
        env:
          VERSION_TYPE: ${{ github.event.inputs.version }}
        run: |
          npm version "$VERSION_TYPE" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync plugin manifest version
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          node -e "
            const fs = require('fs');
            const path = '.claude-plugin/plugin.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            m.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
          "

      - name: Pin npm spec to release version (.mcp.json + READMEs)
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          node -e "
            const fs = require('fs');
            // Match an npm version spec (must start with a digit so it cannot
            // collide with the plugin install syntax 'spanner-readonly-mcp@spanner-readonly-mcp').
            const re = /spanner-readonly-mcp@\d[A-Za-z0-9._-]*/g;
            const next = 'spanner-readonly-mcp@' + process.env.VERSION;
            const required = ['.mcp.json'];
            const optional = ['README.md', 'docs/README.ja.md'];
            for (const path of required) {
              const text = fs.readFileSync(path, 'utf8');
              if (!text.match(re)) throw new Error('No npm spec found in ' + path);
              const updated = text.replace(re, next);
              if (updated !== text) fs.writeFileSync(path, updated);
            }
            for (const path of optional) {
              const text = fs.readFileSync(path, 'utf8');
              const updated = text.replace(re, next);
              if (updated !== text) fs.writeFileSync(path, updated);
            }
          "

      - name: Get release notes
        id: release-notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ env.VERSION }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          NOTES=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPOSITORY}/releases/generate-notes" \
            -f "tag_name=v${VERSION}" \
            -f target_commitish="main" \
            -f "previous_tag_name=${LAST_TAG}" | jq -r '.body')

          echo "$NOTES" > release-notes.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: release/v${{ env.VERSION }}
          delete-branch: true
          title: "Release v${{ env.VERSION }}"
          body-path: release-notes.md
          commit-message: "chore: release v${{ env.VERSION }}"
          labels: |
            Release
          assignees: ${{ github.actor }}
