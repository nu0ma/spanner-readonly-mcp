name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.2.3)"
        required: false
        type: string

jobs:
  release:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'Release')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Get package info
        id: package
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "❌ Invalid semver format: $VERSION"
              echo "Expected format: X.Y.Z (e.g., 1.2.3)"
              exit 1
            fi
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag-check
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update package.json version
        if: steps.tag-check.outputs.exists == 'false' && github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          npm version "${VERSION}" --no-git-tag-version
          git add package.json
          echo "✅ Updated package.json to v${VERSION}"

      - name: Install dependencies
        if: steps.tag-check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.tag-check.outputs.exists == 'false'
        run: pnpm run build

      - name: Verify build output
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          if [ ! -f "dist/index.mjs" ]; then
            echo "❌ Build failed - dist/index.mjs not found"
            exit 1
          fi
          echo "✅ Build verification successful"

      - name: Publish to npm via trusted publishing
        if: steps.tag-check.outputs.exists == 'false'
        run: npm publish --provenance --access public

      - name: Create and push tag
        if: steps.tag-check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.package.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit package.json if it was updated (manual dispatch only)
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && git diff --quiet package.json; then
            echo "No package.json changes to commit"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            git add package.json
            git commit -m "chore: release v${VERSION}"

            # Push to appropriate branch
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
          fi

          # Create and push tag
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "v${VERSION}"

      - name: Create GitHub Release with tag
        id: create-release
        if: steps.tag-check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          EVENT_NAME: ${{ github.event_name }}
          VERSION: ${{ steps.package.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_URL=$(gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --target "${COMMIT_SHA}" \
              --generate-notes)
          else
            printf '%s\n' "$PR_BODY" > release_notes.md
            RELEASE_URL=$(gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --target "${COMMIT_SHA}" \
              --notes-file release_notes.md)
          fi
          echo "url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on PR - Success
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          steps.tag-check.outputs.exists == 'false' &&
          success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.package.outputs.version }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          RELEASE_URL: ${{ steps.create-release.outputs.url }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --body "✅ **Release v${VERSION} completed successfully!**

          - 📦 npm install: \`npm install ${PACKAGE_NAME}@${VERSION}\`
          - 📦 npm package: https://www.npmjs.com/package/${PACKAGE_NAME}/v/${VERSION}
          - 🏷️ GitHub Release: ${RELEASE_URL}
          - 🔗 Workflow run: ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

      - name: Comment on PR - Tag Exists
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          steps.tag-check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --body "⚠️ **Release skipped**: Tag v${VERSION} already exists

          Please check the existing release or update the version in package.json."

      - name: Comment on PR - Failure
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          steps.tag-check.outputs.exists == 'false' &&
          failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.package.outputs.version }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --body "❌ **Release v${VERSION} failed**

          Please check the workflow logs for details.
          🔗 Workflow run: ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
